name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.11.1

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Force clean old icon files
        run: |
          # Remove ANY XML-based adaptive/legacy icons that could override PNGs
          rm -rf android/app/src/main/res/mipmap-anydpi-v26
          rm -f android/app/src/main/res/drawable/ic_launcher_background.xml
          rm -f android/app/src/main/res/drawable/ic_launcher_foreground.xml
          rm -f android/app/src/main/res/drawable-v24/ic_launcher_background.xml
          rm -f android/app/src/main/res/drawable-v24/ic_launcher_foreground.xml
          rm -f android/app/src/main/res/values/ic_launcher_background.xml
          echo "Cleaned old XML icons"
          
          # Verify only PNG icons remain
          echo "Remaining launcher icons:"
          find android/app/src/main/res -name "ic_launcher*" -type f | sort

      - name: Build APK
        working-directory: android
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: confluence-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
